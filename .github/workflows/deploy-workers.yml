name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Inject KV namespace IDs
        run: |
          sed -i 's/id = "placeholder"/id = "${{ secrets.KV_NAMESPACE_ID }}"/' wrangler.toml
          sed -i 's/preview_id = "placeholder"/preview_id = "${{ secrets.KV_PREVIEW_NAMESPACE_ID }}"/' wrangler.toml

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          secrets: |
            muserId
            mtoken
            mhost
            mpass
            mrateType
            menableHDR
            menableH265
            mupdateInterval
            UPDATE_SECRET
        env:
          muserId: ${{ secrets.MIGU_USER_ID }}
          mtoken: ${{ secrets.MIGU_TOKEN }}
          mhost: ${{ secrets.WORKER_HOST }}
          mpass: ${{ secrets.WORKER_PASS }}
          mrateType: ${{ secrets.RATE_TYPE }}
          menableHDR: ${{ secrets.ENABLE_HDR }}
          menableH265: ${{ secrets.ENABLE_H265 }}
          mupdateInterval: ${{ secrets.UPDATE_INTERVAL }}
          UPDATE_SECRET: ${{ secrets.UPDATE_SECRET }}
